<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>巡場打卡</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #f4f6f8;
      color: #222;
    }
    .wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
    }
    h1 {
      margin: 0 0 16px;
      font-size: 24px;
      text-align: center;
    }
    .box {
      border-radius: 12px;
      padding: 14px;
      margin-top: 12px;
      line-height: 1.6;
      word-break: break-word;
      background: #f2f4f7;
    }
    .ok {
      background: #e9f9ee;
      color: #156f3d;
    }
    .err {
      background: #fdecec;
      color: #9f1d1d;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>巡場打卡</h1>
      <div id="infoBox" class="box">載入中...</div>
      <div id="statusBox" class="box">請稍候...</div>
    </div>
  </div>

  <script>
    const LIFF_ID = '2009742928-hAmPBkaF';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwMS-csTNSPXa53FmHGD6U5H7wUbAi77316Jnr-Zibz2TrqOY-WQ_3zAM5IttlEc2ay6Q/exec';

    const POINT_NAME_MAP = {
      'A1_STAIR': 'A1樓梯',
      'A2_STAIR': 'A2樓梯',
      'A3_STAIR': 'A3樓梯',
      'A4_STAIR': 'A4樓梯',
      'A5_STAIR': 'A5樓梯',
      'A6_STAIR': 'A6樓梯',
      'A7_STAIR': 'A7樓梯',
      'A1_TOILET': 'A1廁所',
      'A3_TOILET': 'A3廁所',
      'A7_TOILET': 'A7廁所'
    };

    const infoBox = document.getElementById('infoBox');
    const statusBox = document.getElementById('statusBox');

    function setStatus(message, type = '') {
      statusBox.className = 'box';
      if (type) statusBox.classList.add(type);
      statusBox.textContent = message;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function getSiteFromUrl() {
      const url = new URL(window.location.href);
      return (url.searchParams.get('site') || '').trim();
    }

    async function sendRecord(payload) {
      const response = await fetch(GAS_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify(payload)
      });
      return await response.json();
    }

    async function initApp() {
      try {
        const site = getSiteFromUrl();

        if (!site) {
          setStatus('網址缺少 site 參數', 'err');
          return;
        }

        const pointName = POINT_NAME_MAP[site] || site;

        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();

        infoBox.innerHTML = `
          <div><b>巡場點：</b>${escapeHtml(pointName)}</div>
          <div><b>LINE名稱：</b>${escapeHtml(profile.displayName || '')}</div>
        `;

        setStatus('記錄中...');

        const payload = {
          displayName: profile.displayName || '',
          userId: profile.userId || '',
          siteCode: site,
          siteName: pointName,
          status: '成功',
          note: ''
        };

        const res = await sendRecord(payload);

        if (res.ok) {
          setStatus('已記錄：' + pointName, 'ok');
        } else {
          setStatus('寫入失敗：' + (res.message || '未知錯誤'), 'err');
        }

      } catch (err) {
        setStatus('處理失敗：' + (err.message || String(err)), 'err');
      }
    }

    initApp();
  </script>
</body>
</html>
