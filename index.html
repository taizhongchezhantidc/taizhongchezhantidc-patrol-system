<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>巡場掃描</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }

    .wrap {
      padding: 20px;
    }

    h1 {
      margin-top: 10px;
      font-size: 22px;
    }

    .status {
      margin-top: 30px;
      font-size: 26px;
      padding: 20px;
      border-radius: 12px;
      background: #222;
    }

    .ok {
      background: #0f5132;
    }

    .err {
      background: #842029;
    }

    .sub {
      margin-top: 10px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>

<body>
<div class="wrap">
  <h1>巡場掃描中</h1>

  <div id="statusBox" class="status">
    初始化中...
  </div>

  <div class="sub">
    請將鏡頭對準 QR
  </div>
</div>

<script>
    const LIFF_ID = '2009742928-hAmPBkaF';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwMS-csTNSPXa53FmHGD6U5H7wUbAi77316Jnr-Zibz2TrqOY-WQ_3zAM5IttlEc2ay6Q/exec';

// ===== QR 對照 =====
const QR_MAP = {
  'X1a9-Kq2P-mL8s': 'A1_STAIR',
  'X2b4-Tr9N-pV3k': 'A2_STAIR',
  'X3c7-Yu6M-zR1q': 'A3_STAIR',
  'X4d2-Hj8W-nT5v': 'A4_STAIR',
  'X5e6-Po3L-kC9x': 'A5_STAIR',
  'X6f1-Bn7D-qM4r': 'A6_STAIR',
  'X7g8-Lm2S-wF6t': 'A7_STAIR',
  'T1h3-Zx9Q-vB2m': 'A1_TOILET',
  'T3j5-Cv4E-nK8p': 'A3_TOILET',
  'T7k9-As6R-yU1d': 'A7_TOILET'
};

const POINT_NAME_MAP = {
  'A1_STAIR': 'A1樓梯',
  'A2_STAIR': 'A2樓梯',
  'A3_STAIR': 'A3樓梯',
  'A4_STAIR': 'A4樓梯',
  'A5_STAIR': 'A5樓梯',
  'A6_STAIR': 'A6樓梯',
  'A7_STAIR': 'A7樓梯',
  'A1_TOILET': 'A1廁所',
  'A3_TOILET': 'A3廁所',
  'A7_TOILET': 'A7廁所'
};

let profile = { displayName: '', userId: '' };
let scanning = false;

const statusBox = document.getElementById('statusBox');

// ===== 顯示 =====
function show(msg, type='') {
  statusBox.className = 'status';
  if(type) statusBox.classList.add(type);
  statusBox.textContent = msg;
}

// ===== 解碼 =====
function decodeQR(raw) {
  return QR_MAP[raw] || null;
}

// ===== 傳送 =====
async function send(payload){
  const res = await fetch(GAS_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body: JSON.stringify(payload)
  });
  return await res.json();
}

// ===== 掃描循環 =====
async function startScanLoop(){
  if(scanning) return;
  scanning = true;

  while(true){
    try{
      show('掃描中...');

      const result = await liff.scanCodeV2();
      const raw = result?.value?.trim();

      if(!raw){
        show('未讀取到', 'err');
        await delay(1000);
        continue;
      }

      const decoded = decodeQR(raw);

      if(!decoded){
        show('無效 QR', 'err');

        await send({
          displayName: profile.displayName,
          userId: profile.userId,
          qrRaw: raw,
          decodedPoint: '',
          pointName: '',
          status: '失敗',
          note: '無效QR'
        });

        await delay(1200);
        continue;
      }

      const name = POINT_NAME_MAP[decoded] || decoded;

      await send({
        displayName: profile.displayName,
        userId: profile.userId,
        qrRaw: raw,
        decodedPoint: decoded,
        pointName: name,
        status: '成功',
        note: ''
      });

      show('✔ ' + name, 'ok');

      await delay(1200);

    }catch(e){
      show('掃描失敗', 'err');
      await delay(1500);
    }
  }
}

// ===== 工具 =====
function delay(ms){
  return new Promise(r=>setTimeout(r,ms));
}

// ===== 初始化 =====
async function init(){
  await liff.init({ liffId: LIFF_ID });

  if(!liff.isLoggedIn()){
    liff.login();
    return;
  }

  const p = await liff.getProfile();
  profile.displayName = p.displayName;
  profile.userId = p.userId;

  show('準備完成，開始掃描');

  startScanLoop();
}

init();
</script>

</body>
</html>
